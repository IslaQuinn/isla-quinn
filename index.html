<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Isla Quinn</title>
<style>
    body{ margin:0; font-family:Arial, sans-serif; background:#f4f4f4; text-align:center; }
    .cover{ width:100%; height:200px; object-fit:cover; }
    .profile{ margin-top:-80px; }
    .profile img{ width:160px; height:160px; border-radius:50%; border:6px solid white; object-fit:cover; box-shadow:0 6px 18px rgba(0,0,0,0.25); }
    .name{ font-size:26px; font-weight:bold; margin-top:12px; }
    .social{ display:flex; justify-content:center; gap:18px; margin-top:15px; }
    .icon{ width:52px; height:52px; border-radius:50%; object-fit:cover; transition:transform .25s; }
    .icon:hover{ transform:scale(1.12); }
    .links{ padding:25px; max-width:420px; margin:auto; }
    .card{ background:white; border-radius:14px; padding:12px; margin-bottom:22px; box-shadow:0 8px 20px rgba(0,0,0,0.12); transition:transform .25s; }
    .card:hover{ transform:translateY(-4px); }
    .card img{ width:100%; max-height:260px; object-fit:contain; border-radius:10px; }
    .card p{ margin-top:10px; font-size:18px; font-weight:bold; color: #333; }
</style>
</head>
<body>

<img class="cover" src="Capa.jpg">

<div class="profile">
<img src="Perfil.jpg">
<div class="name">Isla Quinn</div>
</div>

<div class="social">

<img src="Intagram.jpg" class="icon">
</a>
<a href="https://www.tiktok.com/@isla.quinn7?_r=1&_t=ZS-94kDF1dF7K8" target="_blank">
<img src="TikTok.jpg" class="icon">
</a>
<a href="#">
<img src="Only.jpg" class="icon">
</a>
</div>

<div class="links">
<div class="card">
<img src="foto1.jpg"> <p>Exclusive Content</p>
</div>
<div class="card">
<img src="foto2.jpg"> <p>Private Photos</p>
</div>
<div class="card">
<img src="foto3.jpg"> <p>Subscribe for more</p>
</div>
</div>

</body>
</html>
